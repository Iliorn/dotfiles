# Host-local Hyprland config (monitor layout + workspace pinning).
#
# Copy to host.conf on each machine (install.sh does this automatically the
# first time). host.conf is gitignored — never commit it.
#
# The values below match the laptop-with-external-monitor layout. Edit them
# for the local hardware. Workspace 10 lives on the built-in panel; the rest
# go on the external display.

################
### MONITORS ###
################
monitor = DP-2, 2560x1440@60, 0x0, 1
monitor = eDP-1, preferred, auto, 1
monitor = , highres, auto, 1

####################
### WORKSPACES   ###
####################
workspace = 1, monitor:DP-2, default:true
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-2
workspace = 5, monitor:DP-2
workspace = 6, monitor:DP-2
workspace = 7, monitor:DP-2
workspace = 8, monitor:DP-2
workspace = 9, monitor:DP-2
workspace = 10, monitor:eDP-1, default:true
